<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato - Arcanjo</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="header">
    <div class="container-header">

        <div class="logo-area">
            <img src="img/Arcanjos-logo.jpeg" alt="Logo Arcanjo">
            <h1>Arcanjo - Soluções Tecnológicas</h1>
        </div>

        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="sobre.html">Sobre</a></li>
                <li><a href="servicos.html">Serviços</a></li>
                <li><a href="contato.html" class="ativo">Contato</a></li>
                <li><a href="tarefas.html">Tarefas JS</a></li>
            </ul>
        </nav>

    </div>
</header>

<main class="conteudo">

    <h2>Fale Conosco</h2>

    <p>Preencha o formulário abaixo e entraremos em contato.</p>

    <form>
        <label for="nome">Nome</label>
        <input type="text" id="nome" required>

        <label for="email">Email</label>
        <input type="email" id="email" required>

        <label for="mensagem">Mensagem</label>
        <textarea id="mensagem" rows="5" required></textarea>

        <button type="submit">Enviar</button>
    </form>

</main>

<footer>
    <p>&copy; 2026 Arcanjo - Soluções Tecnológicas</p>
</footer>

</body>
</html>
