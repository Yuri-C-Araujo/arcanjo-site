<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato - Arcanjo</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="header">
    <div class="container-header">
        <div class="logo-area">
            <img src="img/Arcanjos-logo.jpeg" alt="Logo Arcanjo">
            <h1>Arcanjo - Soluções Tecnológicas</h1>
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="sobre.html">Sobre</a></li>
                <li><a href="servicos.html">Serviços</a></li>
                <li><a href="contato.html" class="ativo">Contato</a></li>
            </ul>
        </nav>
    </div>
</header>

<main class="conteudo">
    <h2>Solicitação de Serviço / Suporte</h2>
    <p>Preencha os dados abaixo para abertura de chamado ou orçamento técnico.</p>

    <div id="feedback-sistema" class="mensagem-alerta"></div>

    <form id="formContato" onsubmit="return validarFormulario(event)">
        <label for="nome">Nome Completo</label>
        <input type="text" id="nome">

        <label for="email">E-mail Corporativo</label>
        <input type="text" id="email">

        <label for="servico">Tipo de Serviço Necessário</label>
        <select id="servico">
            <option value="">-- Selecione uma opção --</option>
            <option value="suporte">Suporte Técnico de TI</option>
            <option value="redes">Configuração de Redes</option>
            <option value="hardware">Manutenção de Hardware</option>
            <option value="ia">Automação com IA</option>
        </select>

        <label for="mensagem">Detalhes do Chamado / Problema</label>
        <textarea id="mensagem" rows="5"></textarea>

        <button type="submit">Enviar Solicitação</button>
    </form>
</main>

<footer>
    <p>&copy; 2026 Arcanjo - Soluções Tecnológicas</p>
</footer>

<script src="js/script.js"></script>

</body>
</html>
